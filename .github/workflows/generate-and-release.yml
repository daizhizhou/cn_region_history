name: Generate SQL dump and publish release
on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag (e.g. 2026-07-15-2023)'
        required: true
        default: ''
      data_year:
        description: 'Data year included in the dump (e.g. 2023)'
        required: true
        default: '2023'
jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install prerequisites
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run generation script
        env:
          DATA_YEAR: ${{ inputs.data_year }}
        run: |
          mkdir -p output release
          python scripts/generate_sql.py --data-year "${{ inputs.data_year }}" --output "output/cn_regions_${{ inputs.release_tag }}.sql"

      - name: Zip generated SQL
        run: |
          ZIP_PATH="release/cn_regions_${{ inputs.release_tag }}.zip"
          cd output
          zip -r "../$ZIP_PATH" . || true
          echo "ZIP_PATH=$ZIP_PATH" >> $GITHUB_OUTPUT

      - name: Create GitHub release
        id: create_release
        uses: actions/create-release@v1
        with:
          tag_name: ${{ inputs.release_tag }}
          release_name: ${{ inputs.release_tag }}
          body: |
            SQL dump generated by automated workflow.
            Data year: ${{ inputs.data_year }}
            Generated by workflow: ${{ github.run_id }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload release asset (zip)
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: release/cn_regions_${{ inputs.release_tag }}.zip
          asset_name: cn_regions_${{ inputs.release_tag }}.zip
          asset_content_type: application/zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
